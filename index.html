<div class="container">
    <header>
        <h1>AI Master-Prompt Generator 🎨</h1>
        <p>Design the perfect prompt for your AI generations.</p>
    </header>

    <main>
        <section class="presets-section">
            <button id="presetAnime">🗡️ Shonen Anime Vibe</button>
            <button id="presetSciFi">🦾 Sci-Fi Armor Vibe</button>
            <button id="surpriseBtn">🎲 Surprise Me!</button>
        </section>

        <section class="input-section">
            
            <div class="form-group">
                <label for="subject">Main Subject / Scene:</label>
                <input type="text" id="subject" placeholder="e.g. A rogue ninja with blazing red eyes...">
            </div>

            <div class="form-group">
                <label for="refImageUrl">Reference Image URL (For Consistency):</label>
                <input type="url" id="refImageUrl" placeholder="Paste image link here...">
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="strictConsistency" checked>
                <label for="strictConsistency">Enable Strict Facial Consistency Mode</label>
            </div>

            <div class="grid-2-col">
                <div class="form-group">
                    <label for="artStyle">Art Style:</label>
                    <select id="artStyle">
                        <option value="Photorealistic, 8k resolution, highly detailed">Photorealistic</option>
                        <option value="Cel-shaded anime style, vibrant studio animation">Anime / Cel-shaded</option>
                        <option value="Cyberpunk style, neon aesthetic, futuristic">Cyberpunk</option>
                        <option value="Dark fantasy, concept art, gritty">Dark Fantasy</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="lighting">Lighting:</label>
                    <select id="lighting">
                        <option value="Cinematic lighting, volumetric rays">Cinematic</option>
                        <option value="Dramatic rim lighting, high contrast">Dramatic Rim Light</option>
                        <option value="Neon lights, glowing energy effects">Neon / Energy Glow</option>
                        <option value="Golden hour natural lighting">Golden Hour</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cameraAngle">Camera Angle:</label>
                    <select id="cameraAngle">
                        <option value="Eye-level medium shot">Medium Shot</option>
                        <option value="Extreme close-up macro shot">Close-up</option>
                        <option value="Low angle hero shot, imposing perspective">Low Angle (Hero)</option>
                        <option value="Wide panoramic drone shot">Wide Shot</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="aspectRatio">Aspect Ratio:</label>
                    <select id="aspectRatio">
                        <option value="--ar 16:9">16:9 (Desktop/YouTube)</option>
                        <option value="--ar 9:16">9:16 (Reels/Shorts)</option>
                        <option value="--ar 1:1">1:1 (Square)</option>
                        <option value="--ar 21:9">21:9 (Ultrawide)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="negativePrompt">Custom Negative Prompt (Exclude things):</label>
                <input type="text" id="negativePrompt" placeholder="e.g. text, watermarks, red colors...">
            </div>

            <button id="generateBtn">Generate Master Prompt ✨</button>
        </section>

        <section class="output-section">
            <h2>Your Final Prompt:</h2>
            <textarea id="outputArea" rows="6" readonly placeholder="Your master prompt will appear here..."></textarea>
            <button id="copyBtn">Copy to Clipboard 📋</button>
            
            <div class="history-section">
                <h3>🕒 Recent Prompts</h3>
                <ul id="historyList"></ul>
            </div>
        </section>
    </main>
</div>
